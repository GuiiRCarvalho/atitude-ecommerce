name: Node.js CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: atitude-ecommerce/package-lock.json

      - name: Install backend dependencies
        working-directory: ./atitude-ecommerce
        run: npm ci

      - name: Run backend build
        working-directory: ./atitude-ecommerce
        run: npm run build